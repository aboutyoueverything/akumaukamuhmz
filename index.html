<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            transition: all 0.3s ease;
        }
        .heart {
            font-size: 50px;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 15px;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
        h1 { color: #ff4d6d; margin-bottom: 15px; font-size: 26px; }
        p { color: #5c5c5c; line-height: 1.6; font-size: 16px; margin-bottom: 30px; }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        #btnMau {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
        #btnMau:hover { transform: scale(1.05); background-color: #ff758f; }
        #btnGak {
            background-color: #f0f0f0;
            color: #5c5c5c;
            position: absolute;
            right: 40px;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="heart">❤️</div>
        <h1 id="textJudul">Hai Kamu...</h1>
        <p id="textPesan">Aku mau ngomong sesuatu. Sebenarnya udah lama aku mendem perasaan ini ke kamu. Kamu mau gak jadi pacar aku?</p>
        
        <div class="btn-group">
            <button id="btnMau" onclick="terima()">Mau! 🥰</button>
            <button id="btnGak" onmouseover="pindahTombol()" onclick="pindahTombol()">Nggak 😢</button>
        </div>
    </div>

    <script>
        // Fitur tombol 'Nggak' otomatis kabur/menghindar saat didekati
        function pindahTombol() {
            let btnGak = document.getElementById("btnGak");
            let xAcak = Math.floor(Math.random() * 160) - 80; 
            let yAcak = Math.floor(Math.random() * 80) - 40;  
            btnGak.style.transform = `translate(${xAcak}px, ${yAcak}px)`;
        }

        // Fitur kalau si dia klik 'Mau!'
        function terima() {
            let card = document.getElementById("mainCard");
            card.innerHTML = `
                <div class="heart">💖</div>
                <h1>Yeayy!! I Love You! 🥰</h1>
                <p>Makasih ya udah nerima aku. Hari ini resmi jadi hari paling bahagia buat aku! ✨</p>
            `;
            document.body.style.background = "linear-gradient(135deg, #ff758f 0%, #ff85a1 100%)";
        }
    </script>
</body>
</html>
